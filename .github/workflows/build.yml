name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          curl -sLO https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p cmdline-tools/latest
          cd cmdline-tools
          mv cmdline-tools/* ../latest/ 2>/dev/null || true
          cd ..
          yes | cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build with Gradle
        run: |
          echo "sdk.dir=$HOME/android-sdk" > local.properties
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: List generated APKs
        run: ls -la OsuXposedHook/app/build/outputs/apk/debug/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: osu-xposed-hook.apk
          path: OsuXposedHook/app/build/outputs/apk/debug/*.apk
