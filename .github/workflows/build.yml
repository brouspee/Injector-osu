name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        run: |
          echo "Installing Android SDK..."
          cd $HOME
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip || echo "WGET FAILED"
          ls -la cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses 2>&1 | head -5
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -10
          echo "sdk.dir=$ANDROID_HOME" > $GITHUB_WORKSPACE/local.properties
          echo "SDK installed at: $ANDROID_HOME"
          ls -la $ANDROID_HOME

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Build DLL
        run: cd OsuInjectorMod && dotnet restore && dotnet build -c Release

      - name: Build Android APK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          cat local.properties
          echo "ANDROID_HOME: $ANDROID_HOME"
          ls -la $ANDROID_HOME
          chmod +x gradlew
          ./gradlew assembleDebug 2>&1 | tail -30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: osu-injector.apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: OsuInjectorMod.dll
          path: OsuInjectorMod/bin/Release/net8.0/OsuInjectorMod.dll
