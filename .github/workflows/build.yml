name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /opt/android-sdk
          key: android-sdk-v34

      - name: Install SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/android-sdk
          cd /opt
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          yes | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" || true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Build DLL
        run: cd OsuInjectorMod && dotnet restore && dotnet build -c Release

      - name: Build APK
        run: |
          echo "sdk.dir=/opt/android-sdk" > local.properties
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Find APKs
        run: |
          echo "=== APK Files ==="
          find app/build/outputs -name "*.apk" -type f

      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: osu-injector-arm64-v8a.apk
          path: app/build/outputs/apk/debug/arm64-v8a/app-debug.apk

      - name: Upload ARMv7 APK
        uses: actions/upload-artifact@v4
        with:
          name: osu-injector-armeabi-v7a.apk
          path: app/build/outputs/apk/debug/armeabi-v7a/app-debug.apk

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: osu-injector.apk
          path: app/build/outputs/apk/debug/universal/app-debug.apk

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: OsuInjectorMod.dll
          path: OsuInjectorMod/bin/Release/net8.0/OsuInjectorMod.dll
