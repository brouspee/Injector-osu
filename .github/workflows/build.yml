name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /opt/android-sdk
          key: android-sdk-v34

      - name: Install SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          echo "Installing Android SDK..."
          mkdir -p /opt/android-sdk
          cd /opt
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          yes | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" || true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Build DLL
        run: cd OsuInjectorMod && dotnet restore && dotnet build -c Release

      - name: Build APK
        run: |
          if [ -f "local.properties" ]; then
            cat local.properties
          else
            echo "sdk.dir=/opt/android-sdk" > local.properties
          fi
          echo "Contents of local.properties:"
          cat local.properties
          echo "Contents of /opt/android-sdk:"
          ls -la /opt/android-sdk
          chmod +x gradlew
          ./gradlew assembleDebug 2>&1 | tee build_output.log
          echo "===Build output (last 50 lines)==="
          tail -50 build_output.log

      - name: Upload APK
        run: |
          echo "Uploading APK..."
          ls -la app/build/outputs/apk/debug/ || echo "Directory not found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: osu-injector.apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: OsuInjectorMod.dll
          path: OsuInjectorMod/bin/Release/net8.0/OsuInjectorMod.dll
