name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Get SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /opt/android-sdk
          key: android-sdk-v34

      - name: Install SDK if needed
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/android-sdk/cmdline-tools
          cd /opt/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p ../latest
          mv cmdline-tools/* ../latest/ 2>/dev/null || mv cmdline-tools ../latest
          yes | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" || true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Build DLL
        run: |
          cd OsuInjectorMod
          dotnet restore
          dotnet build -c Release 2>&1

      - name: Build APK
        run: |
          echo "sdk.dir=/opt/android-sdk" > local.properties
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -30

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: OsuInjectorMod.dll
          path: OsuInjectorMod/bin/Release/net8.0/OsuInjectorMod.dll
          if-no-files-found: ignore
