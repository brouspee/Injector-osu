name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: bitfunk/action-setup-android@master
        with:
          platform-version: 34
          build-tools-version: 34.0.0
          include-tools: true

      - name: Build APK
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: List generated APKs
        run: ls -la OsuXposedHook/app/build/outputs/apk/debug/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: osu-xposed-hook.apk
          path: OsuXposedHook/app/build/outputs/apk/debug/*.apk
