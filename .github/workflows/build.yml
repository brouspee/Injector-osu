name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Build DLL
        run: cd OsuInjectorMod && dotnet restore && dotnet build -c Release

      - name: Build Android APK
        run: |
          echo "=== ENV ==="
          printenv | grep -i android || true
          echo "=== DIR ==="
          ls -la 
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties
          chmod +x gradlew && ./gradlew assembleDebug
        continue-on-error: true

      - name: Check APK
        run: ls -la app/build/outputs/apk/debug/*.apk || echo "NO APK"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: osu-injector.apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: OsuInjectorMod.dll
          path: OsuInjectorMod/bin/Release/net8.0/OsuInjectorMod.dll
