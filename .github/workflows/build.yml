name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Build DLL
        run: cd OsuInjectorMod && dotnet restore && dotnet build -c Release

      - name: Build Android APK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          chmod +x gradlew
          ./gradlew assembleDebug --info 2>&1 | tail -100
        continue-on-error: true

      - name: Debug APK output
        run: |
          echo "=== Checking outputs dir ==="
          ls -laR app/build/outputs/
          echo "=== Trying to find APK ==="
          find app/build -name "*.apk" -type f || echo "NO APK FOUND"

      - name: Upload all outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-outputs
          path: app/build/outputs/

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: OsuInjectorMod.dll
          path: OsuInjectorMod/bin/Release/net8.0/OsuInjectorMod.dll
